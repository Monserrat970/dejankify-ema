services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dejankify
      POSTGRES_PASSWORD: dejankify_dev
      POSTGRES_DB: dejankify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dejankify"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dejankify:dejankify_dev@db:5432/dejankify
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY}
      DAILY_ANALYSIS_LIMIT: ${DAILY_ANALYSIS_LIMIT}
      DAILY_COST_LIMIT_CENTS: ${DAILY_COST_LIMIT_CENTS}
      AUTH_URL: http://localhost:3000

volumes:
  pgdata:
